<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <title>saily | 日本海洋研究所</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
  <style>
    :root {
      --navy: #14324a;
      --blue: #0f6f94;
      --cyan: #1aa6b7;
      --green: #20a36b;
      --ink: #142033;
      --muted: #6b7a90;
      --line: #d9e3ee;
      --panel: #ffffff;
      --panel-soft: #f7fafc;
      --page: #eef4f8;
      --danger: #dc2626;
      --shadow: 0 12px 32px rgba(15, 42, 66, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; background: var(--page); color: var(--ink); }
    button, input, textarea { font: inherit; letter-spacing: 0; }
    button { cursor: pointer; }
    .header { background: var(--panel); border-bottom: 1px solid var(--line); box-shadow: 0 2px 18px rgba(17, 42, 64, 0.08); }
    .header-top { min-height: 64px; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark { width: 46px; height: 46px; display: block; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 8px 18px rgba(15, 111, 148, 0.24)); flex-shrink: 0; }
    .header-title h1 { font-family: 'Zen Maru Gothic', sans-serif; font-size: 20px; line-height: 1.1; color: var(--navy); }
    .header-title p { margin-top: 3px; font-size: 11px; color: var(--muted); }
    .post-count { background: #eef8f8; border: 1px solid #cde8ea; color: var(--blue); padding: 7px 12px; border-radius: 999px; font-size: 12px; white-space: nowrap; }
    .post-count strong { color: var(--green); font-size: 15px; }
    .tabs { display: flex; gap: 4px; padding: 0 8px; background: #f8fbfd; border-top: 1px solid var(--line); }
    .tab { flex: 1; padding: 12px; text-align: center; user-select: none; color: var(--muted); font-size: 14px; font-weight: 700; border-bottom: 3px solid transparent; transition: 0.2s; }
    .tab:hover { color: var(--blue); background: #eef6f8; }
    .tab.active { color: var(--navy); background: #fff; border-bottom-color: var(--cyan); }
    .main { height: calc(100vh - 112px); height: calc(100dvh - 112px); position: relative; overflow: hidden; }
    .view { position: absolute; inset: 0; display: none; }
    .view.active { display: block; }
    #map { width: 100%; height: 100%; background: #b9ddec; }
    .loading-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; display: flex; align-items: center; gap: 10px; padding: 16px 28px; background: #fff; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); font-size: 13px; }
    .loader { width: 18px; height: 18px; border: 3px solid #e2e8f0; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .timeline-toggle { position: absolute; right: 18px; bottom: calc(18px + env(safe-area-inset-bottom)); z-index: 500; display: flex; align-items: center; gap: 6px; padding: 11px 18px; background: var(--navy); color: #fff; border: 1px solid rgba(255,255,255,0.35); border-radius: 999px; box-shadow: var(--shadow); font-size: 13px; font-weight: 700; }
    .timeline-toggle:hover { background: #0f2638; }
    .timeline-panel { position: absolute; top: 14px; right: 14px; bottom: 14px; z-index: 600; width: 360px; display: flex; flex-direction: column; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; transform: translateX(calc(100% + 28px)); transition: transform 0.3s; }
    .timeline-panel.open { transform: translateX(0); }
    .timeline-header { padding: 15px 16px; display: flex; align-items: center; justify-content: space-between; background: #fbfdff; border-bottom: 1px solid var(--line); }
    .timeline-title { color: var(--navy); font-size: 14px; font-weight: 700; }
    .timeline-close { background: transparent; border: 0; color: var(--muted); font-size: 20px; }
    .timeline-list { flex: 1; overflow-y: auto; padding: 10px; }
    .post-item { padding: 10px; margin-bottom: 6px; border: 1px solid transparent; border-radius: 8px; transition: 0.2s; }
    .post-item:hover, .post-item.active { background: #eef8fb; border-color: #cce8ee; }
    .post-item-content { display: flex; gap: 10px; cursor: pointer; }
    .post-thumb { width: 58px; height: 58px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #e2e8f0; }
    .post-content { flex: 1; min-width: 0; }
    .post-meta { display: flex; gap: 6px; margin-bottom: 2px; color: #7f8ea3; font-size: 10px; }
    .post-author { color: var(--blue); font-weight: 700; }
    .post-title { margin-bottom: 2px; color: var(--ink); font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-comment { color: var(--muted); font-size: 11px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-actions { display: flex; gap: 4px; margin-top: 7px; padding-top: 7px; border-top: 1px solid #e7edf4; }
    .post-action-btn, .popup-action-btn { background: #f4f8fb; border: 1px solid #e1ebf3; color: var(--blue); padding: 5px 9px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    .post-action-btn:hover, .popup-action-btn:hover { background: #e8f5f7; color: var(--navy); }
    .port-dot { width: 14px; height: 14px; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 3px 10px rgba(13, 45, 68, 0.32); }
    .empty-state { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .empty-state-emoji { font-size: 34px; margin-bottom: 8px; }
    .marker-photo-wrap { box-sizing: border-box; width: 42px; height: 42px; display: block; overflow: hidden; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 3px 12px rgba(13, 45, 68, 0.35); background: #e2e8f0; }
    .marker-photo { width: 100%; height: 100%; display: block; object-fit: cover; border-radius: 50%; }
    .post-cluster { width: 42px; height: 42px; display: grid; place-items: center; background: var(--blue); color: #fff; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 4px 14px rgba(13, 45, 68, 0.32); font-size: 13px; font-weight: 700; }
    .post-cluster.medium { background: var(--navy); }
    .post-cluster.large { background: #0b1f2f; }
    .leaflet-popup-content-wrapper { border-radius: 8px; padding: 0; overflow: hidden; box-shadow: var(--shadow); }
    .leaflet-popup-content { margin: 0; width: 240px !important; }
    .popup-photo { width: 100%; height: 140px; object-fit: cover; display: block; }
    .popup-photo.port { height: 92px; display: grid; place-items: center; background: linear-gradient(135deg, #e7f8f0, #e8f5f7); color: var(--navy); font-family: 'Zen Maru Gothic', sans-serif; font-size: 20px; font-weight: 700; }
    .popup-body { padding: 12px 14px; }
    .popup-meta { margin-bottom: 4px; color: var(--muted); font-size: 11px; }
    .popup-author { color: var(--blue); font-weight: 700; }
    .popup-title { margin-bottom: 6px; color: var(--ink); font-size: 14px; font-weight: 700; }
    .popup-comment { margin-bottom: 8px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .popup-actions { display: flex; gap: 4px; padding-top: 8px; border-top: 1px solid #e7edf4; }
    .post-view { height: 100%; overflow-y: auto; padding: 16px 10px calc(132px + env(safe-area-inset-bottom)) 10px; background: linear-gradient(180deg, #eef4f8 0%, #f8fbfd 100%); -webkit-overflow-scrolling: touch; }
    .post-container { width: 100%; max-width: 960px; margin: 0 auto; }
    .card { margin-bottom: 12px; padding: 18px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 4px 16px rgba(15,42,66,0.06); }
    .card-title { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; color: var(--navy); font-size: 14px; font-weight: 700; }
    .card-step { width: 24px; height: 24px; display: grid; place-items: center; background: var(--navy); color: #fff; border-radius: 6px; font-size: 12px; }
    .author-area { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .author-chip, .author-add { padding: 8px 12px; background: #fff; border-radius: 999px; font-size: 12px; }
    .author-chip { border: 1px solid var(--line); color: var(--ink); display: flex; align-items: center; gap: 5px; }
    .author-chip:hover, .author-add:hover { background: #f4f9fb; }
    .author-chip.active { border-color: var(--cyan); background: #edf9fa; color: var(--blue); font-weight: 700; }
    .author-chip-remove { opacity: 0.55; font-size: 14px; line-height: 1; }
    .author-add { border: 1px dashed #b8c8d8; color: var(--muted); }
    .author-input { display: none; gap: 6px; margin-top: 8px; }
    .author-input.show { display: flex; }
    .author-input input { flex: 1; min-width: 0; padding: 9px 12px; border: 1px solid var(--cyan); border-radius: 999px; outline: none; font-size: 12px; }
    .author-input button { padding: 8px 13px; background: var(--blue); color: #fff; border: 0; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .photo-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .photo-btn { padding: 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; background: var(--panel-soft); border: 1px dashed #b7c8d7; border-radius: 8px; color: var(--muted); transition: 0.2s; }
    .photo-btn:hover { border-color: var(--cyan); background: #edf9fa; color: var(--blue); }
    .photo-btn-icon { font-size: 22px; font-weight: 700; }
    .photo-btn-text { font-size: 12px; font-weight: 700; }
    .photo-btn-hint { font-size: 9px; opacity: 0.8; }
    .photo-preview-wrap { position: relative; display: none; overflow: hidden; border: 1px solid var(--cyan); border-radius: 8px; }
    .photo-preview-wrap.visible { display: block; }
    .photo-preview { width: 100%; max-height: 280px; object-fit: cover; display: block; }
    .photo-replace-btn, .photo-info { position: absolute; background: rgba(20,50,74,0.86); color: #fff; border-radius: 999px; backdrop-filter: blur(10px); font-size: 11px; }
    .photo-replace-btn { top: 10px; right: 10px; padding: 7px 12px; border: 0; }
    .photo-info { left: 10px; bottom: 10px; padding: 5px 10px; }
    .upload-input { display: none; }
    .gps-info { margin-top: 12px; padding: 10px; display: flex; align-items: flex-start; gap: 8px; border-radius: 8px; font-size: 12px; }
    .gps-info.success { background: #e7f8f0; color: #0d6b48; border: 1px solid #c9eadb; }
    .gps-info.warning { background: #fff7e6; color: #8a5b08; border: 1px solid #f1d99c; }
    .gps-info.empty { background: #f4f8fb; color: var(--muted); border: 1px solid var(--line); }
    .gps-info-title { margin-bottom: 2px; font-weight: 700; }
    .gps-info-detail { font-size: 10px; opacity: 0.9; }
    .location-tools { display: none; margin-top: 12px; }
    .location-tools.visible { display: block; }
    .location-tool-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .loc-btn { padding: 9px 12px; background: #fff; color: var(--blue); border: 1px solid var(--cyan); border-radius: 6px; font-size: 12px; font-weight: 700; }
    .loc-btn:hover { background: #edf9fa; }
    .loc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .search-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .search-input { flex: 1; min-width: 0; padding: 9px 12px; border: 1px solid var(--line); border-radius: 6px; outline: none; font-size: 13px; }
    .search-input:focus, .form-input:focus, .form-textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(26,166,183,0.12); }
    .search-btn { padding: 9px 14px; background: var(--blue); color: #fff; border: 0; border-radius: 6px; font-size: 12px; font-weight: 700; }
    .search-results { display: none; max-height: 160px; overflow-y: auto; margin-bottom: 8px; background: #fff; border: 1px solid var(--line); border-radius: 8px; }
    .search-results.visible { display: block; }
    .search-result-item { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; font-size: 12px; cursor: pointer; }
    .search-result-item:hover { background: #edf9fa; }
    .search-result-name { color: var(--ink); font-weight: 700; }
    .search-result-addr { margin-top: 2px; color: #94a3b8; font-size: 10px; }
    .map-instruction, .location-confirm { border: 1px solid #d5ebf0; border-radius: 6px; font-size: 11px; }
    .map-instruction { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding: 9px 12px; background: #edf9fa; color: var(--navy); }
    .location-confirm { display: none; margin-top: 10px; padding: 10px; background: #f8fbfd; }
    .location-confirm.visible { display: block; }
    .location-coord { margin-bottom: 6px; color: var(--muted); }
    .location-coord strong { color: var(--blue); }
    .mini-map { display: none; height: 240px; margin-top: 10px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .mini-map.visible { display: block; }
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; margin-bottom: 5px; color: var(--navy); font-size: 12px; font-weight: 700; }
    .required { color: #ef4444; margin-left: 3px; }
    .form-input, .form-textarea { width: 100%; padding: 11px 12px; background: #fff; color: var(--ink); border: 1px solid var(--line); border-radius: 6px; outline: none; font-size: 14px; }
    .form-textarea { min-height: 140px; resize: vertical; line-height: 1.6; }
    .submit-section { position: fixed; left: 0; right: 0; bottom: 0; z-index: 1200; padding: 12px 16px; background: rgba(255,255,255,0.96); border-top: 1px solid var(--line); box-shadow: 0 -10px 28px rgba(15,42,66,0.09); backdrop-filter: blur(10px); }
    .submit-section-inner { max-width: 680px; margin: 0 auto; }
    .btn { width: 100%; padding: 15px 24px; background: linear-gradient(135deg, var(--blue), var(--navy)); color: #fff; border: 0; border-radius: 8px; box-shadow: 0 8px 18px rgba(15, 111, 148, 0.24); font-size: 15px; font-weight: 700; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading-spinner { display: inline-block; width: 14px; height: 14px; margin-right: 6px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    .error-msg { display: none; margin: 12px 0; padding: 10px 12px; background: #fee2e2; color: #991b1b; border-radius: 8px; font-size: 12px; }
    .error-msg.show { display: block; }
    .success-overlay, .edit-modal { position: fixed; inset: 0; z-index: 2000; display: none; align-items: center; justify-content: center; padding: 16px; background: rgba(12,27,40,0.52); }
    .success-overlay.visible, .edit-modal.visible { display: flex; }
    .success-card, .edit-modal-card { background: #fff; border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .success-card { width: 100%; max-width: 320px; padding: 24px 20px; text-align: center; }
    .success-icon { margin-bottom: 8px; color: var(--green); font-size: 42px; font-weight: 700; }
    .success-title { margin-bottom: 6px; color: var(--navy); font-family: 'Zen Maru Gothic', sans-serif; font-size: 18px; font-weight: 700; }
    .success-text { margin-bottom: 14px; color: var(--muted); font-size: 12px; }
    .success-btns, .edit-modal-footer { display: flex; gap: 8px; }
    .btn-secondary, .btn-mini-primary, .btn-danger { padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 700; }
    .btn-secondary { flex: 1; background: #fff; color: var(--muted); border: 1px solid var(--line); }
    .btn-mini-primary { flex: 1; background: linear-gradient(135deg, var(--blue), var(--navy)); color: #fff; border: 0; }
    .btn-danger { background: #fee2e2; color: var(--danger); border: 0; }
    .edit-modal-card { width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .edit-modal-header, .edit-modal-footer { position: sticky; background: #fff; z-index: 1; padding: 16px 20px; }
    .edit-modal-header { top: 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); }
    .edit-modal-footer { bottom: 0; border-top: 1px solid var(--line); }
    .edit-modal-title { color: var(--navy); font-family: 'Zen Maru Gothic', sans-serif; font-size: 16px; font-weight: 700; }
    .edit-modal-close { background: transparent; border: 0; color: var(--muted); font-size: 22px; }
    .edit-modal-body { padding: 20px; }
    .edit-modal-photo { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; background: #e2e8f0; }
    .edit-info-text { margin-bottom: 12px; padding: 8px 10px; background: #f8fafc; color: #94a3b8; border-radius: 8px; font-size: 11px; }
    @media (max-width: 768px) {
      .header-top { min-height: 58px; padding: 10px 12px; }
      .brand-mark { width: 40px; height: 40px; }
      .header-title h1 { font-size: 18px; }
      .post-count { padding: 6px 9px; font-size: 11px; }
      .main { height: calc(100vh - 106px); height: calc(100dvh - 106px); }
      .timeline-toggle { right: 12px; bottom: calc(28px + env(safe-area-inset-bottom)); padding: 12px 18px; }
      .timeline-panel { top: 0; right: 0; bottom: 0; width: 100%; border-radius: 0; transform: translateX(100%); }
      .post-view { padding: 10px 0 calc(128px + env(safe-area-inset-bottom)) 0; }
      .card { border-left: 0; border-right: 0; border-radius: 0; box-shadow: none; padding: 16px 14px; }
      .submit-section { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)) 12px; }
      .form-textarea { min-height: 160px; }
      .photo-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="header-title">
        <img class="brand-mark" src="assets/japan-ocean-research-logo.png" alt="日本海洋研究所">
        <div>
          <h1>saily</h1>
          <p>日本海洋研究所</p>
        </div>
      </div>
      <div class="post-count"><strong id="postCount">0</strong> 投稿</div>
    </div>
    <div class="tabs">
      <div class="tab active" data-view="map" onclick="switchView('map')">マップ</div>
      <div class="tab" data-view="post" onclick="switchView('post')">投稿</div>
    </div>
  </header>

  <div class="main">
    <div class="view active" id="mapView">
      <div id="map"></div>
      <div class="loading-overlay" id="loadingOverlay" style="display:none;"><div class="loader"></div><span>読み込み中...</span></div>
      <button class="timeline-toggle" onclick="toggleTimeline()">投稿一覧</button>
      <div class="timeline-panel" id="timelinePanel">
        <div class="timeline-header"><div class="timeline-title">投稿一覧</div><button class="timeline-close" onclick="toggleTimeline()">×</button></div>
        <div class="timeline-list" id="timelineList"></div>
      </div>
    </div>

    <div class="view" id="postView">
      <div class="post-view">
        <div class="post-container">
          <div class="card">
            <div class="card-title"><span class="card-step">1</span>お名前</div>
            <div class="author-area" id="authorArea"><button class="author-add" onclick="showAuthorInput()">+ 新しい名前</button></div>
            <div class="author-input" id="authorInput"><input type="text" id="newAuthorName" placeholder="名前を入力" maxlength="20"><button onclick="addNewAuthor()">追加</button></div>
          </div>

          <div class="card">
            <div class="card-title"><span class="card-step">2</span>写真と位置</div>
            <div class="photo-buttons" id="photoButtons">
              <button type="button" class="photo-btn" onclick="document.getElementById('cameraInput').click();"><span class="photo-btn-icon">CAM</span><span class="photo-btn-text">カメラで撮影</span><span class="photo-btn-hint">位置情報が残ります</span></button>
              <button type="button" class="photo-btn" onclick="document.getElementById('photoInput').click();"><span class="photo-btn-icon">IMG</span><span class="photo-btn-text">写真を選ぶ</span><span class="photo-btn-hint">既存の写真から</span></button>
            </div>
            <div class="photo-preview-wrap" id="photoPreviewWrap"><img id="photoPreview" class="photo-preview" alt="選択した写真"><button type="button" class="photo-replace-btn" onclick="replacePhoto()">変更</button><div id="photoInfo" class="photo-info"></div></div>
            <input type="file" id="cameraInput" class="upload-input" accept="image/*" capture="environment">
            <input type="file" id="photoInput" class="upload-input" accept="image/*">
            <div id="gpsInfo" class="gps-info empty"><span>PIN</span><div><div class="gps-info-title">写真の位置情報</div><div class="gps-info-detail">写真を選ぶと自動で読み取ります</div></div></div>
            <div class="location-tools" id="locationTools">
              <div class="location-tool-row"><button type="button" class="loc-btn" onclick="useCurrentLocation(event)">現在地を使う</button></div>
              <div class="search-row"><input type="text" class="search-input" id="searchInput" placeholder="場所名・住所で検索（例: 釜山港）"><button type="button" class="search-btn" onclick="searchLocation()">検索</button></div>
              <div class="search-results" id="searchResults"></div>
              <div class="map-instruction" id="mapInstruction" style="display:none;">地図をタップして位置を指定できます。ピンはドラッグで微調整できます。</div>
            </div>
            <div id="miniMap" class="mini-map"></div>
            <div class="location-confirm" id="locationConfirm"><div class="location-coord">設定された位置: <strong><span id="confirmLat">-</span>, <span id="confirmLng">-</span></strong></div><div style="font-size:11px;color:#94a3b8;">ピンをドラッグして微調整できます</div></div>
          </div>

          <div class="card">
            <div class="card-title"><span class="card-step">3</span>内容</div>
            <div class="form-group"><label class="form-label">タイトル<span class="required">*</span></label><input type="text" class="form-input" placeholder="例: 釜山港に到着" id="titleInput" maxlength="60"></div>
            <div class="form-group"><label class="form-label">コメント</label><textarea class="form-textarea" placeholder="その場所の様子や感想など" id="commentInput" maxlength="500"></textarea></div>
          </div>
          <div id="errorMsg" class="error-msg"></div>
        </div>
      </div>
      <div class="submit-section"><div class="submit-section-inner"><button class="btn" onclick="submitPost()" id="submitBtn">投稿する</button></div></div>
    </div>
  </div>

  <div class="success-overlay" id="successOverlay"><div class="success-card"><div class="success-icon">OK</div><div class="success-title">投稿しました</div><div class="success-text">地図に反映されました</div><div class="success-btns"><button class="btn-secondary" onclick="closeSuccessAndReset()">続けて投稿</button><button class="btn-mini-primary" onclick="closeAndShowMap()">地図を見る</button></div></div></div>

  <div class="edit-modal" id="editModal">
    <div class="edit-modal-card">
      <div class="edit-modal-header"><div class="edit-modal-title">投稿を編集</div><button class="edit-modal-close" onclick="closeEditModal()">×</button></div>
      <div class="edit-modal-body">
        <img id="editPhoto" class="edit-modal-photo" alt="投稿写真">
        <div class="edit-info-text">写真と位置情報は変更できません。編集できるのは投稿者・タイトル・コメントです。</div>
        <div class="form-group"><label class="form-label">投稿者</label><div class="author-area" id="editAuthorArea"></div></div>
        <div class="form-group"><label class="form-label">タイトル<span class="required">*</span></label><input type="text" class="form-input" id="editTitleInput" maxlength="60"></div>
        <div class="form-group"><label class="form-label">コメント</label><textarea class="form-textarea" id="editCommentInput" maxlength="500"></textarea></div>
        <div id="editErrorMsg" class="error-msg"></div>
      </div>
      <div class="edit-modal-footer"><button class="btn-danger" onclick="deleteCurrentPost()">削除</button><button class="btn-secondary" onclick="closeEditModal()">キャンセル</button><button class="btn-mini-primary" onclick="saveEdit()" id="saveEditBtn">保存</button></div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxBc_DVbAVhUM4Kh_SV31ah_wl_7YweeNSkpvU2BJ8Rsl-4LtugiVVxF8badfpGa3BE5Q/exec';
    const DEFAULT_PORT_POINTS = [
      { id: 'port_tokyo_bay', author: '港情報', title: '東京湾', comment: '航海の出発地点', lat: 35.5, lng: 139.8, timestamp: '2026-05-04 00:00:00', color: '#20a36b' },
      { id: 'port_busan', author: '港情報', title: '釜山港', comment: '航海の到着地点', lat: 35.0951, lng: 129.0756, timestamp: '2026-05-04 00:00:00', color: '#dc2626' }
    ];
    let currentLat = null, currentLng = null, currentPhotoBase64 = null, currentPhotoName = '', currentPhotoTimestamp = '';
    let miniMap = null, miniMapMarker = null, selectedAuthor = '', posts = [], markers = {}, portMarkers = {}, postClusterLayer = null, map, editingPost = null, editingAuthor = '', editingType = 'post';

    function switchView(view) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-view="${view}"]`).classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(view + 'View').classList.add('active');
      if (view === 'map') { setTimeout(() => map?.invalidateSize(), 100); loadPosts(); }
    }

    function loadAuthors() {
      const stored = localStorage.getItem('saily_authors') || localStorage.getItem('busan_authors');
      const authors = stored ? JSON.parse(stored) : [];
      return authors.length ? authors : ['原田', '大場', '山田'];
    }
    function saveAuthors(authors) { localStorage.setItem('saily_authors', JSON.stringify(authors)); }
    function renderAuthors() {
      const area = document.getElementById('authorArea');
      area.querySelectorAll('.author-chip').forEach(el => el.remove());
      const addBtn = area.querySelector('.author-add');
      loadAuthors().forEach(name => {
        const chip = document.createElement('button');
        chip.className = 'author-chip' + (selectedAuthor === name ? ' active' : '');
        chip.innerHTML = `${escapeHtml(name)} <span class="author-chip-remove" onclick="removeAuthor('${escapeQuote(name)}', event)">×</span>`;
        chip.onclick = e => { if (!e.target.classList.contains('author-chip-remove')) selectAuthor(name); };
        area.insertBefore(chip, addBtn);
      });
    }
    function selectAuthor(name) { selectedAuthor = name; localStorage.setItem('saily_last_author', name); renderAuthors(); }
    function showAuthorInput() { document.getElementById('authorInput').classList.add('show'); document.getElementById('newAuthorName').focus(); }
    function addNewAuthor() {
      const input = document.getElementById('newAuthorName');
      const name = input.value.trim();
      if (!name) return;
      const authors = loadAuthors();
      if (!authors.includes(name)) { authors.push(name); saveAuthors(authors); }
      selectedAuthor = name; input.value = ''; document.getElementById('authorInput').classList.remove('show'); renderAuthors();
    }
    function removeAuthor(name, event) {
      event.stopPropagation();
      if (!confirm(`「${name}」を削除しますか？`)) return;
      saveAuthors(loadAuthors().filter(a => a !== name));
      if (selectedAuthor === name) selectedAuthor = '';
      renderAuthors();
    }
    document.getElementById('newAuthorName').addEventListener('keypress', e => { if (e.key === 'Enter') addNewAuthor(); });

    const photoInput = document.getElementById('photoInput');
    const cameraInput = document.getElementById('cameraInput');
    const photoPreview = document.getElementById('photoPreview');
    const photoPreviewWrap = document.getElementById('photoPreviewWrap');
    const photoButtons = document.getElementById('photoButtons');
    const photoInfoEl = document.getElementById('photoInfo');
    const gpsInfo = document.getElementById('gpsInfo');
    const miniMapEl = document.getElementById('miniMap');
    const locationTools = document.getElementById('locationTools');
    const locationConfirm = document.getElementById('locationConfirm');
    const mapInstruction = document.getElementById('mapInstruction');

    function replacePhoto() { confirm('カメラで撮り直しますか？\nキャンセルすると写真から選び直します。') ? cameraInput.click() : photoInput.click(); }
    function formatJstTimestamp(date = new Date()) {
      const parts = new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      }).formatToParts(date).reduce((acc, part) => {
        acc[part.type] = part.value;
        return acc;
      }, {});
      return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second}`;
    }
    function compressImage(file, maxWidth = 1600, quality = 0.85) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let width = img.width, height = img.height;
            if (width > maxWidth) { height = maxWidth / width * height; width = maxWidth; }
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            resolve({ base64: dataUrl.split(',')[1], dataUrl, size: Math.round(dataUrl.length * 0.75 / 1024) });
          };
          img.onerror = reject; img.src = e.target.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
      });
    }
    async function handlePhotoFile(file) {
      if (!file) return;
      currentPhotoName = file.name;
      currentPhotoTimestamp = '';
      const originalSize = Math.round(file.size / 1024);
      try {
        const exif = await exifr.parse(file, { gps: true });
        const takenAt = exif?.DateTimeOriginal || exif?.CreateDate || exif?.ModifyDate;
        if (takenAt instanceof Date && !Number.isNaN(takenAt.getTime())) currentPhotoTimestamp = formatJstTimestamp(takenAt);
        if (exif?.latitude && exif?.longitude) {
          currentLat = exif.latitude; currentLng = exif.longitude;
          gpsInfo.className = 'gps-info success';
          gpsInfo.innerHTML = `<span>OK</span><div><div class="gps-info-title">位置情報を取得しました</div><div class="gps-info-detail">${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}</div></div>`;
          locationTools.classList.remove('visible');
          showMiniMap(currentLat, currentLng, true);
        } else {
          gpsInfo.className = 'gps-info warning';
          gpsInfo.innerHTML = '<span>INFO</span><div><div class="gps-info-title">位置情報がありません</div><div class="gps-info-detail">下の方法で位置を指定してください</div></div>';
          locationTools.classList.add('visible'); mapInstruction.style.display = 'flex'; showMiniMap(35.0951, 129.0756, false);
          currentLat = null; currentLng = null; updateLocationConfirm();
        }
      } catch (err) { console.error('EXIF読み取りエラー:', err); }
      try {
        const compressed = await compressImage(file);
        currentPhotoBase64 = compressed.base64;
        photoPreview.src = compressed.dataUrl;
        photoPreviewWrap.classList.add('visible');
        photoButtons.style.display = 'none';
        photoInfoEl.textContent = `${originalSize}KB → ${compressed.size}KB`;
      } catch (err) { console.error('圧縮エラー:', err); showError('写真の処理に失敗しました'); }
    }
    photoInput.addEventListener('change', e => handlePhotoFile(e.target.files[0]));
    cameraInput.addEventListener('change', e => handlePhotoFile(e.target.files[0]));

    function showMiniMap(lat, lng, hasMarker = true) {
      miniMapEl.classList.add('visible');
      const initOrUpdate = () => {
        if (miniMap) {
          miniMap.setView([lat, lng], hasMarker ? 13 : 11);
          if (miniMapMarker) { miniMap.removeLayer(miniMapMarker); miniMapMarker = null; }
        } else {
          miniMap = L.map('miniMap').setView([lat, lng], hasMarker ? 13 : 11);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(miniMap);
          miniMap.on('click', e => placePinOnMiniMap(e.latlng.lat, e.latlng.lng));
        }
        if (hasMarker) placePinOnMiniMap(lat, lng);
        setTimeout(() => miniMap.invalidateSize(), 100);
      };
      miniMap ? initOrUpdate() : setTimeout(initOrUpdate, 100);
    }
    function placePinOnMiniMap(lat, lng) {
      currentLat = lat; currentLng = lng;
      if (miniMapMarker) miniMap.removeLayer(miniMapMarker);
      miniMapMarker = L.marker([lat, lng], { draggable: true }).addTo(miniMap);
      miniMapMarker.on('dragend', e => { const pos = e.target.getLatLng(); currentLat = pos.lat; currentLng = pos.lng; updateLocationConfirm(); });
      updateLocationConfirm();
    }
    function updateLocationConfirm() {
      if (currentLat !== null && currentLng !== null) {
        locationConfirm.classList.add('visible');
        document.getElementById('confirmLat').textContent = currentLat.toFixed(6);
        document.getElementById('confirmLng').textContent = currentLng.toFixed(6);
      } else { locationConfirm.classList.remove('visible'); }
    }
    function useCurrentLocation(event) {
      if (!navigator.geolocation) { showError('お使いのブラウザは位置情報に対応していません'); return; }
      const btn = event.currentTarget;
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="loading-spinner"></span>取得中...'; btn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        pos => { showMiniMap(pos.coords.latitude, pos.coords.longitude, true); btn.innerHTML = originalText; btn.disabled = false; },
        err => { showError('現在地を取得できませんでした: ' + err.message); btn.innerHTML = originalText; btn.disabled = false; },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }
    async function searchLocation() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      const resultsEl = document.getElementById('searchResults');
      resultsEl.innerHTML = '<div style="padding:12px;text-align:center;font-size:12px;color:#94a3b8;">検索中...</div>';
      resultsEl.classList.add('visible');
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=ja`);
        const data = await response.json();
        if (!data.length) { resultsEl.innerHTML = '<div style="padding:12px;text-align:center;font-size:12px;color:#94a3b8;">見つかりませんでした</div>'; return; }
        resultsEl.innerHTML = data.map(item => `<div class="search-result-item" onclick="selectSearchResult(${item.lat}, ${item.lon})"><div class="search-result-name">${escapeHtml(item.display_name.split(',')[0])}</div><div class="search-result-addr">${escapeHtml(item.display_name)}</div></div>`).join('');
      } catch (err) { resultsEl.innerHTML = '<div style="padding:12px;text-align:center;font-size:12px;color:#dc2626;">検索に失敗しました</div>'; }
    }
    function selectSearchResult(lat, lng) { showMiniMap(parseFloat(lat), parseFloat(lng), true); document.getElementById('searchResults').classList.remove('visible'); document.getElementById('searchInput').value = ''; }
    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchLocation(); });

    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000); }
    function showEditError(msg) { const el = document.getElementById('editErrorMsg'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000); }
    async function verifyPostReflected(author, title, timeoutMs = 12000) {
      const startedAt = Date.now();
      while (Date.now() - startedAt < timeoutMs) {
        try { const response = await fetch(GAS_URL + '?action=get&_=' + Date.now()); const data = await response.json(); if ((data.posts || []).some(p => p.author === author && p.title === title)) return true; } catch (_) {}
        await new Promise(resolve => setTimeout(resolve, 1500));
      }
      return false;
    }
    async function submitPost() {
      const title = document.getElementById('titleInput').value.trim();
      const comment = document.getElementById('commentInput').value.trim();
      if (!selectedAuthor) { showError('お名前を選んでください'); return; }
      if (!currentPhotoBase64) { showError('写真を選んでください'); return; }
      if (!currentLat || !currentLng) { showError('位置を指定してください'); return; }
      if (!title) { showError('タイトルを入力してください'); return; }
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>送信中...';
      try {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'create', author: selectedAuthor, title, comment, lat: currentLat, lng: currentLng, photoBase64: currentPhotoBase64, photoName: currentPhotoName, timestamp: currentPhotoTimestamp || formatJstTimestamp() }) });
        document.getElementById('successOverlay').classList.add('visible');
        if (!await verifyPostReflected(selectedAuthor, title)) showError('送信は完了しましたが、一覧への反映確認ができませんでした。通信状況をご確認のうえ再読み込みしてください。');
      } catch (err) { console.error('送信エラー:', err); showError('投稿に失敗しました: ' + err.message); btn.disabled = false; btn.innerHTML = '投稿する'; }
    }
    function closeSuccessAndReset() {
      document.getElementById('successOverlay').classList.remove('visible');
      document.getElementById('titleInput').value = ''; document.getElementById('commentInput').value = '';
      photoPreviewWrap.classList.remove('visible'); photoButtons.style.display = 'grid'; photoInput.value = ''; cameraInput.value = '';
      currentPhotoBase64 = null; currentPhotoName = ''; currentPhotoTimestamp = ''; currentLat = null; currentLng = null;
      gpsInfo.className = 'gps-info empty'; gpsInfo.innerHTML = '<span>PIN</span><div><div class="gps-info-title">写真の位置情報</div><div class="gps-info-detail">写真を選ぶと自動で読み取ります</div></div>';
      locationTools.classList.remove('visible'); locationConfirm.classList.remove('visible'); mapInstruction.style.display = 'none'; miniMapEl.classList.remove('visible');
      if (miniMap) { miniMap.remove(); miniMap = null; miniMapMarker = null; }
      const btn = document.getElementById('submitBtn'); btn.disabled = false; btn.innerHTML = '投稿する';
    }
    function closeAndShowMap() { closeSuccessAndReset(); switchView('map'); setTimeout(loadPosts, 1500); }

    function loadPortPoints() {
      try {
        const saved = JSON.parse(localStorage.getItem('saily_port_points') || 'null');
        if (Array.isArray(saved)) return saved;
      } catch (_) {}
      return DEFAULT_PORT_POINTS.map(p => ({ ...p }));
    }
    function savePortPoints(points) { localStorage.setItem('saily_port_points', JSON.stringify(points)); }
    function buildPopupContent(item, type = 'post') {
      const media = type === 'port'
        ? `<div class="popup-photo port">${escapeHtml(item.title)}</div>`
        : `<img class="popup-photo" src="${item.photoUrl}">`;
      return `${media}<div class="popup-body"><div class="popup-meta"><span class="popup-author">${escapeHtml(item.author)}</span> · ${formatDate(item.timestamp)}</div><div class="popup-title">${escapeHtml(item.title)}</div><div class="popup-comment">${escapeHtml(item.comment || '')}</div><div class="popup-actions"><button class="popup-action-btn" onclick="openEditModal('${item.id}', '${type}')">編集</button></div></div>`;
    }
    function openEditModal(itemId, type = 'post') {
      const item = type === 'port' ? loadPortPoints().find(p => p.id === itemId) : posts.find(p => p.id === itemId);
      if (!item) return;
      editingType = type; editingPost = item; editingAuthor = item.author;
      document.getElementById('editPhoto').src = type === 'port' ? 'assets/japan-ocean-research-logo.png' : item.photoUrl;
      document.getElementById('editTitleInput').value = item.title || '';
      document.getElementById('editCommentInput').value = item.comment || '';
      renderEditAuthors(); document.getElementById('editModal').classList.add('visible');
    }
    function renderEditAuthors() {
      const authors = loadAuthors(); if (!authors.includes(editingAuthor) && editingAuthor) authors.unshift(editingAuthor);
      const area = document.getElementById('editAuthorArea'); area.innerHTML = '';
      authors.forEach(name => { const chip = document.createElement('button'); chip.className = 'author-chip' + (editingAuthor === name ? ' active' : ''); chip.textContent = name; chip.onclick = () => { editingAuthor = name; renderEditAuthors(); }; area.appendChild(chip); });
    }
    function closeEditModal() { document.getElementById('editModal').classList.remove('visible'); editingPost = null; editingAuthor = ''; editingType = 'post'; }
    async function saveEdit() {
      const title = document.getElementById('editTitleInput').value.trim();
      const comment = document.getElementById('editCommentInput').value.trim();
      if (!title) { showEditError('タイトルを入力してください'); return; }
      if (!editingAuthor) { showEditError('投稿者を選んでください'); return; }
      const btn = document.getElementById('saveEditBtn'); btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>保存中...';
      if (editingType === 'port') {
        const points = loadPortPoints();
        const idx = points.findIndex(p => p.id === editingPost.id);
        if (idx !== -1) {
          points[idx] = { ...points[idx], author: editingAuthor, title, comment };
          savePortPoints(points); renderPortMarkers();
        }
        btn.disabled = false; btn.innerHTML = '保存'; closeEditModal(); return;
      }
      try {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'edit', id: editingPost.id, author: editingAuthor, title, comment }) });
        const idx = posts.findIndex(p => p.id === editingPost.id);
        if (idx !== -1) { posts[idx].author = editingAuthor; posts[idx].title = title; posts[idx].comment = comment; renderPosts(); }
        btn.disabled = false; btn.innerHTML = '保存'; closeEditModal(); setTimeout(loadPosts, 2000);
      } catch (err) { console.error('編集エラー:', err); showEditError('保存に失敗しました'); btn.disabled = false; btn.innerHTML = '保存'; }
    }
    async function deleteCurrentPost() {
      if (!editingPost) return;
      if (editingType === 'port') {
        if (!confirm(`「${editingPost.title}」を削除しますか？`)) return;
        savePortPoints(loadPortPoints().filter(p => p.id !== editingPost.id));
        renderPortMarkers(); closeEditModal(); return;
      }
      if (!confirm(`「${editingPost.title}」を削除しますか？\n\n※ 写真も一緒に削除されます\n※ この操作は取り消せません`)) return;
      const btn = document.getElementById('saveEditBtn'); btn.disabled = true;
      try {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'delete', id: editingPost.id }) });
        posts = posts.filter(p => p.id !== editingPost.id); renderPosts(); closeEditModal(); setTimeout(loadPosts, 2000);
      } catch (err) { console.error('削除エラー:', err); alert('削除に失敗しました'); btn.disabled = false; }
    }

    function initMap() {
      map = L.map('map').setView([34.5, 134.0], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, attribution: '© OpenStreetMap' }).addTo(map);
      postClusterLayer = L.markerClusterGroup({
        showCoverageOnHover: false,
        spiderfyOnMaxZoom: true,
        maxClusterRadius: 42,
        iconCreateFunction: cluster => {
          const count = cluster.getChildCount();
          const size = count >= 10 ? 'large' : count >= 4 ? 'medium' : '';
          return L.divIcon({
            className: '',
            html: `<div class="post-cluster ${size}">${count}</div>`,
            iconSize: [42, 42],
            iconAnchor: [21, 21]
          });
        }
      });
      map.addLayer(postClusterLayer);
      renderPortMarkers();
    }
    async function loadPosts() {
      document.getElementById('loadingOverlay').style.display = 'flex';
      try {
        const response = await fetch(GAS_URL + '?action=get');
        const data = await response.json();
        posts = (data.posts || []).filter(p => p.author !== 'テスト' && !(p.photoUrl || '').includes('example.com'));
        renderPosts();
      } catch (err) {
        console.error('読み込みエラー:', err);
        document.getElementById('timelineList').innerHTML = '<div class="empty-state"><div class="empty-state-emoji">!</div>読み込みに失敗しました</div>';
      }
      document.getElementById('loadingOverlay').style.display = 'none';
    }
    function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }
    function escapeQuote(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
    function renderPosts() {
      if (postClusterLayer) postClusterLayer.clearLayers();
      markers = {};
      document.getElementById('postCount').textContent = posts.length;
      renderPortMarkers();
      if (!posts.length) { document.getElementById('timelineList').innerHTML = '<div class="empty-state"><div class="empty-state-emoji">0</div>まだ投稿がありません<br><small>「投稿」タブから投稿してみましょう</small></div>'; return; }
      document.getElementById('timelineList').innerHTML = posts.map(p => `<div class="post-item" data-id="${p.id}"><div class="post-item-content" onclick="focusPost('${p.id}')"><img class="post-thumb" src="${p.photoUrl}" onerror="this.style.background='#e2e8f0'"><div class="post-content"><div class="post-meta"><span class="post-author">${escapeHtml(p.author)}</span><span>${formatDate(p.timestamp)}</span></div><div class="post-title">${escapeHtml(p.title)}</div><div class="post-comment">${escapeHtml(p.comment || '')}</div></div></div><div class="post-actions"><button class="post-action-btn" onclick="openEditModal('${p.id}')">編集</button><button class="post-action-btn" onclick="focusPost('${p.id}')">地図で見る</button></div></div>`).join('');
      posts.forEach(p => {
        const icon = L.divIcon({ className: '', html: `<span class="marker-photo-wrap"><img class="marker-photo" src="${p.photoUrl}"></span>`, iconSize: [42, 42], iconAnchor: [21, 21] });
        markers[p.id] = L.marker([p.lat, p.lng], { icon }).bindPopup(buildPopupContent(p), { maxWidth: 240 });
        postClusterLayer.addLayer(markers[p.id]);
      });
      const bounds = L.latLngBounds(posts.map(p => [p.lat, p.lng])); loadPortPoints().forEach(p => bounds.extend([p.lat, p.lng])); map.fitBounds(bounds, { padding: [40, 40] });
    }
    function renderPortMarkers() {
      if (!map) return;
      Object.values(portMarkers).forEach(m => map.removeLayer(m)); portMarkers = {};
      loadPortPoints().forEach(p => {
        const icon = L.divIcon({ className: '', html: `<div class="port-dot" style="background:${p.color || '#0f6f94'}"></div>`, iconSize: [14, 14], iconAnchor: [7, 7] });
        portMarkers[p.id] = L.marker([p.lat, p.lng], { icon }).addTo(map).bindPopup(buildPopupContent(p, 'port'), { maxWidth: 240 });
      });
    }
    function focusPost(id) {
      const post = posts.find(p => p.id === id);
      if (!post) return;
      document.querySelectorAll('.post-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`.post-item[data-id="${id}"]`)?.classList.add('active');
      const marker = markers[id];
      if (postClusterLayer && marker) {
        postClusterLayer.zoomToShowLayer(marker, () => marker.openPopup());
      } else {
        map.flyTo([post.lat, post.lng], 12, { duration: 1 });
        marker?.openPopup();
      }
    }
    function toggleTimeline() { document.getElementById('timelinePanel').classList.toggle('open'); }
    function formatDate(timestamp) { const d = new Date(String(timestamp).replace(' ', 'T')); return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

    initMap(); renderAuthors();
    const lastAuthor = localStorage.getItem('saily_last_author') || localStorage.getItem('busan_last_author');
    if (lastAuthor && loadAuthors().includes(lastAuthor)) selectAuthor(lastAuthor);
    loadPosts();
    setInterval(() => { if (document.getElementById('mapView').classList.contains('active')) loadPosts(); }, 30000);
  </script>
</body>
</html>
