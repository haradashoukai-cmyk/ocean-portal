name: Apply saily logo replacement

on:
  push:
    paths:
      - .github/workflows/apply-saily-logo.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace header mark with logo
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets
          python3 - <<'PY'
from pathlib import Path
import base64
logo = """"""
Path('assets/japan-ocean-research-logo.png').write_bytes(base64.b64decode(logo))
p = Path('saily.html')
s = p.read_text(encoding='utf-8')
s = s.replace(".brand-mark { width: 38px; height: 38px; border-radius: 8px; display: grid; place-items: center; background: linear-gradient(135deg, var(--navy), var(--cyan)); color: #fff; font-weight: 700; box-shadow: 0 8px 18px rgba(15, 111, 148, 0.24); flex-shrink: 0; }", ".brand-mark { width: 46px; height: 46px; display: block; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 8px 18px rgba(15, 111, 148, 0.24)); flex-shrink: 0; }")
s = s.replace(".brand-mark { width: 34px; height: 34px; }", ".brand-mark { width: 40px; height: 40px; }")
s = s.replace('<span class="brand-mark">S</span>', '<img class="brand-mark" src="assets/japan-ocean-research-logo.png" alt="日本海洋研究所">')
p.write_text(s, encoding='utf-8')
PY
          rm -f .github/workflows/apply-saily-logo.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add saily.html assets/japan-ocean-research-logo.png .github/workflows/apply-saily-logo.yml
          git commit -m "Replace saily header mark with ocean logo" || exit 0
          git push
